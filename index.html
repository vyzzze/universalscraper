<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- scan beam animation during fetch -->
  <div class="scan-overlay" id="scanOverlay"><div class="scan-beam"></div></div>

  <!-- ── Fullscreen lightbox ── -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
    <div class="lb-inner" onclick="event.stopPropagation()">
      <img class="lb-img" id="lbImg" src="" alt="">
      <div class="lb-bar">
        <span class="lb-url" id="lbUrl"></span>
        <button class="lb-dl-btn" onclick="downloadSingle()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M6.5 1v7M3.5 5.5l3 3 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="1" y1="11.5" x2="12" y2="11.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          Download
        </button>
      </div>
    </div>
  </div>

  <div class="app">

    <!-- ── Header ── -->
    <header class="app-header">
      <div class="wordmark">
        <svg class="wordmark-icon" width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="1.5" y="5.5" width="19" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="11" cy="11" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <line x1="1.5" y1="11" x2="7" y2="11" stroke="currentColor" stroke-width="1.5"/>
          <line x1="15" y1="11" x2="20.5" y2="11" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="wordmark-name">Universal Scraper</span>
        <span class="wordmark-sep">/</span>
        <span class="wordmark-sub">main-content image extraction</span>
      </div>
    </header>

    <!-- ── Control panel ── -->
    <section class="control-panel">
      <div class="url-row">
        <div class="url-field">
          <span class="url-prompt">&gt;</span>
          <input class="url-input" id="urlInput" type="url"
            placeholder="https://en.wikipedia.org/wiki/Cat"
            value="https://en.wikipedia.org/wiki/Cat"
            spellcheck="false" autocomplete="off">
        </div>
        <button class="btn-analyze" id="runBtn" onclick="run()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="5.5" cy="5.5" r="3.8" stroke="currentColor" stroke-width="1.6"/>
            <line x1="8.5" y1="8.5" x2="12" y2="12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          Analyze
        </button>
      </div>
      <div class="panel-footer">
        <div class="options">
          <label class="opt"><input type="checkbox" id="optExcluded" checked><span>Show excluded</span></label>
          <label class="opt"><input type="checkbox" id="optLog" checked><span>Show log</span></label>
          <label class="opt"><input type="checkbox" id="optJson"><span>Raw JSON</span></label>
        </div>
        <div class="proxy-control">
          <span class="proxy-label">proxy</span>
          <select class="proxy-select" id="proxySelect">
            <option value="https://corsproxy.io/?">corsproxy.io</option>
            <option value="https://api.allorigins.win/raw?url=">allorigins.win</option>
            <option value="https://cors-anywhere.herokuapp.com/">cors-anywhere</option>
            <option value="">none</option>
          </select>
        </div>
      </div>
    </section>

    <!-- ── Status bar ── -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot"></span>
      <span class="status-msg" id="statusMsg">ready</span>
      <div class="progress-steps">
        <span class="pstep" id="s0">fetch</span>
        <span class="pstep-sep">·</span>
        <span class="pstep" id="s1">parse</span>
        <span class="pstep-sep">·</span>
        <span class="pstep" id="s2">score</span>
        <span class="pstep-sep">·</span>
        <span class="pstep" id="s3">extract</span>
        <span class="pstep-sep">·</span>
        <span class="pstep" id="s4">filter</span>
      </div>
    </div>

    <!-- ── Results ── -->
    <main id="results"></main>

    <!-- ── Footer ── -->
    <footer class="app-footer">
      <span>Universal Scraper</span>
      <span class="footer-sep">·</span>
      <span>client-side · DOMParser · heuristics engine</span>
      <span class="footer-sep">·</span>
      <a href="https://github.com/vyzzze/universalscraper" target="_blank">GitHub</a>
    </footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
